<!DOCTYPE html>
<html>
<head>
    <title>Phishing Detector PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI';
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            padding: 15px 40px;
        }

        .container {
            display: flex;
            justify-content: center;
            margin-top: 50px;
            gap: 40px;
        }

        .card {
            background: rgba(255,255,255,0.1);
            padding: 25px;
            border-radius: 15px;
            width: 350px;
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            margin-top: 10px;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 8px;
            border: none;
            background: #00c6ff;
            cursor: pointer;
        }

        .progress {
            width: 100%;
            height: 10px;
            background: #444;
            border-radius: 10px;
            margin-top: 10px;
        }

        .bar {
            height: 100%;
            width: 0%;
            border-radius: 10px;
            transition: 0.5s;
        }

        .high { background: red; }
        .medium { background: orange; }
        .low { background: limegreen; }

        canvas {
            background: white;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="navbar">
    <h2>🔐 Phishing Detector</h2>
</div>

<div class="container">

    <!-- LEFT -->
    <div class="card">
        <h3>Scan URL</h3>

        <form method="POST">
            <input type="text" name="url"
            value="{{ url }}"
            placeholder="https://example.com" required>

            <button type="submit">Scan</button>
        </form>

        {% if result %}
        <p><b>{{ result.url }}</b></p>
        <p><b>{{ result.risk }}</b></p>

        <div class="progress">
            <div id="bar" class="bar"></div>
        </div>

        <p>{{ result.reason }}</p>
        {% endif %}
    </div>

    <!-- RIGHT -->
    <div class="card">
        <h3>Analytics</h3>
        <canvas id="chart"></canvas>
    </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    {% if result %}
        let risk = "{{ result.risk }}";
        let bar = document.getElementById("bar");

        if (risk === "High") {
            bar.style.width = "90%";
            bar.classList.add("high");
        } else if (risk === "Medium") {
            bar.style.width = "60%";
            bar.classList.add("medium");
        } else {
            bar.style.width = "30%";
            bar.classList.add("low");
        }
    {% endif %}

    let high = {{ high }};
    let medium = {{ medium }};
    let low = {{ low }};

    new Chart(document.getElementById("chart"), {
        type: "doughnut",
        data: {
            labels: ["High", "Medium", "Low"],
            datasets: [{
                data: [high, medium, low],
                backgroundColor: ["red", "orange", "green"]
            }]
        }
    });

});
</script>

</body>
</html>
